<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Trabalhando com Imagens</title>
  </head>
  <body>
    <h2>1. Selca do Jungkook do BTS</h2>
    <img src="jeon.jpg" alt="Selca do Jungkook do BTS" width="300" />

    <h2>2. Imagem com largura de 300px</h2>
    <img src="jungguk.jpg" alt="Selca do Jungkook do BTS" width="300" />

    <h2>3. Imagem dentro de um link</h2>
    <a href="https://ufra.edu.br" target="_blank">
      <img
        src="jungkook.jpg"
        alt="Clique para ir ao site da UFRA"
        width="300"
      />
    </a>

    <h2>4. Legenda usando figure e figcaption</h2>
    <figure>
      <img src="kook.jpg" alt="Paisagem de exemplo" width="300" />
      <figcaption>Figura 1: Selca Jungkook do BTS.</figcaption>
    </figure>
  </body>
</html>
