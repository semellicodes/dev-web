<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Formulário de Cadastro</title>
  </head>
  <body>
    <h2>Preencha seus dados</h2>
    <form action="#" method="POST">
      <label for="nome">Nome:</label><br />
      <input type="text" id="nome" name="nome" required /><br /><br />

      <label for="email">E-mail:</label><br />
      <input type="email" id="email" name="email" required /><br /><br />

      <label for="senha">Senha:</label><br />
      <input type="password" id="senha" name="senha" required /><br /><br />

      <label for="data_nasc">Data de Nascimento:</label><br />
      <input type="date" id="data_nasc" name="data_nasc" /><br /><br />

      <label for="csurso">Selecione seu curso:</label><br />
      <select id="curso" name="curso">
        <option value="si">Sistemas de Informação</option>
        <option value="eng">Licenciatura em Computação</option>
        <option value="cc">Ciência da Computação</option></select
      ><br /><br />

      <p>Gênero:</p>
      <input type="radio" id="masculino" name="genero" value="M" />
      <label for="masculino">Masculino</label>
      <input type="radio" id="feminino" name="genero" value="F" />
      <label for="feminino">Feminino</label><br /><br />

      <input type="checkbox" id="termos" name="termos" required />
      <label for="termos">Aceito os termos e condições</label><br /><br />

      <button type="reset">Enviar Formulário</button>
    </form>
  </body>
</html>
