<!doctype html>
<html>
  <head>
    <title>Aula JS - Questão 5</title>
    <script type="text/javascript">
      int = parseInt(prompt("Digite um número inteiro: "));
      if (int % 2 === 0) {
        alert("O número " + int + " é par.");
      } else {
        alert("O número " + int + " é ímpar.");
      }
    </script>
  </head>
  <body></body>
</html>
