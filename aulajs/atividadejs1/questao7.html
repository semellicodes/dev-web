<!doctype html>
<html>
  <title>Aula JS - Questão 7</title>
  <script type="text/javascript">
    var N = parseInt(prompt("Digite um número inteiro: "));
    var resultado = "";
    var fatorial = 1;
    for (var i = 1; i <= N; i++) {
      fatorial *= i;
    }
    alert("O valor fatorial de " + N + " é: " + fatorial);
  </script>

    <body></body>
  </head>
</html>
