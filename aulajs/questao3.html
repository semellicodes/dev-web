<!doctype html>
<html>
  <head>
    <title>Aula JS - Questão 3</title>
    <script type="text/javascript">
      var F = prompt("Digite a temperatura em Fahrenheit: ");
      var C = ((F - 32) * 5) / 9;
      alert("A temperatura em Celsius é: " + C);
      console.log("A temperatura em Celsius é: " + C);
    </script>
  </head>
