<!doctype html>
<html>
  <head>
    <title>Aula JS - Questão 2</title>
    <script type="text/javascript">
      var C = prompt("Digite a temperatura em Celsius: ");
      var F = (C * 9) / 5 + 32;
      alert("A temperatura em Fahrenheit é: " + F);
      console.log("A temperatura em Fahrenheit é: " + F);
    </script>
  </head>
  <body></body>
</html>
