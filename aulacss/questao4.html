<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Aula CSS - Questão 4</title>

    <style>
      body {
        background-color: #f2f2f2;
        font-family: Arial, sans-serif;
      }

      h1 {
        text-align: center;
        color: darkblue;
      }

      p {
        text-align: justify;
        font-size: 16px;
        line-height: 1.5;
      }

      .card {
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        padding: 20px;
        margin-bottom: 15px;
      }
    </style>
  </head>

  <body>
    <h1>Exemplo de Card</h1>

    <div class="card">
      <p>
        Este conteúdo está dentro de uma caixa estilizada utilizando a classe
        .card.
      </p>
    </div>
  </body>
</html>
