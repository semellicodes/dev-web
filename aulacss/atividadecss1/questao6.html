<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Estilização de Links</title>

    <style>
      body {
        background-color: #f2f2f2;
        font-family: Arial, sans-serif;
      }

      a {
        color: darkblue;
        text-decoration: none;
      }

      a:hover {
        color: red;
      }

      a:visited {
        color: purple;
      }
    </style>
  </head>

  <body>
    <h1>Exemplo de Links</h1>

    <p>
      <a href="https://www.google.com">Acessar Google</a>
    </p>

    <p>
      <a href="https://www.youtube.com">Acessar YouTube</a>
    </p>
  </body>
</html>
