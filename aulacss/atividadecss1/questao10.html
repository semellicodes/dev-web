<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Aula CSS - Questão 10</title>

    <style>
      body {
        background-color: #f2f2f2;
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      .btn {
        background-color: darkblue;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
      }

      .btn:hover {
        background-color: blue;
      }
    </style>
  </head>

  <body>
    <button class="btn">Clique Aqui</button>
  </body>
</html>
