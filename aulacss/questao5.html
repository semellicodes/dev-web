<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Aula CSS - Questão 5</title>

    <style>
      body {
        background-color: #f2f2f2;
        font-family: Arial, sans-serif;
      }

      #menu {
        list-style: none;
        display: flex;
        gap: 15px;
        padding: 0;
      }

      #menu li {
        background-color: white;
        padding: 10px 15px;
        border-radius: 5px;
      }

      #menu a {
        text-decoration: none;
        color: darkblue;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <ul id="menu">
      <li><a href="#">Início</a></li>
      <li><a href="#">Sobre</a></li>
      <li><a href="#">Serviços</a></li>
      <li><a href="#">Contato</a></li>
    </ul>
  </body>
</html>
